# docker-compose.yml
# Agentic AI v3.3 — Sovereignty Stack (Langfuse + Web Intake + Memory)
# Usage: docker compose up -d

services:
  # --- Observability ---
  langfuse-db:
    image: postgres:16-alpine
    container_name: langfuse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:-changeme-local}
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    container_name: langfuse
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD:-changeme-local}@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:-changeme-local-secret}
      NEXTAUTH_URL: http://localhost:3000
      SALT: ${LANGFUSE_SALT:-changeme-local-salt}
      TELEMETRY_ENABLED: "false"

  karakeep-db:
    image: postgres:16-alpine
    container_name: karakeep-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: karakeep
      POSTGRES_USER: karakeep
      POSTGRES_PASSWORD: ${KARAKEEP_DB_PASSWORD:-changeme-local}
    volumes:
      - karakeep-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karakeep"]
      interval: 5s
      timeout: 5s
      retries: 5

  karakeep:
    image: ghcr.io/karakeep-app/karakeep:latest
    container_name: karakeep
    restart: unless-stopped
    ports:
      - "8081:8080"
    environment:
      - DATABASE_URL=postgresql://karakeep:${KARAKEEP_DB_PASSWORD:-changeme-local}@karakeep-db:5432/karakeep
      - NEXTAUTH_SECRET=${KARAKEEP_NEXTAUTH_SECRET:-karakeep-v33-secret-99}
      - NEXTAUTH_URL=http://localhost:8081
      - AUTH_SECRET=${KARAKEEP_NEXTAUTH_SECRET:-karakeep-v33-secret-99}
      - OLLAMA_HOST=http://host.docker.internal:4000
      - DISABLE_WORKERS=true # ПРИНУДИТЕЛЬНО отключаем воркеры на первый запуск для миграции
    depends_on:
      karakeep-db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- Web Intake: ArchiveBox ---
  archivebox:
    image: archivebox/archivebox:latest
    container_name: archivebox
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - archivebox-data:/data
    environment:
      - ALLOWED_HOSTS=*
      - MEDIA_MAX_SIZE=750m

  # --- Workflow: n8n ---
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
      - NODES_EXCLUDE=[]
      - N8N_BLOCK_NODES=[]
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
    volumes:
      - ../../../../database.sqlite:/home/node/.n8n/database.sqlite
      - ../../../../Atlas:/home/node/Atlas
      - n8n_data:/home/node/.n8n_unused

volumes:
  langfuse-db-data:
  karakeep-db-data:
  archivebox-data:
  n8n_data:
