# docker-compose.yml
# Agentic AI v3.3 — Sovereignty Stack (Langfuse + Web Intake + Memory)
# Usage: docker compose up -d
#
# Secrets: docker/.env (gitignored) — required, no defaults. See .env.example.
# Hardening (audit 2026-06-11): all ports bound to 127.0.0.1, images pinned,
# passwords required from env (compose fails loudly if .env missing).

services:
  # --- Observability ---
  langfuse-db:
    image: postgres:16-alpine
    container_name: langfuse-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: langfuse
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: ${LANGFUSE_DB_PASSWORD:?set in docker/.env}
    volumes:
      - langfuse-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
      timeout: 5s
      retries: 5

  langfuse:
    image: langfuse/langfuse:2
    container_name: langfuse
    restart: unless-stopped
    depends_on:
      langfuse-db:
        condition: service_healthy
    ports:
      - "127.0.0.1:3002:3000" # Shifted from 3000 to avoid conflict with LangGraph
    environment:
      DATABASE_URL: postgresql://langfuse:${LANGFUSE_DB_PASSWORD:?set in docker/.env}@langfuse-db:5432/langfuse
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET:?set in docker/.env}
      NEXTAUTH_URL: http://localhost:3002
      SALT: ${LANGFUSE_SALT:?set in docker/.env}
      TELEMETRY_ENABLED: "false"

  # --- Knowledge Graph: Neo4j ---
  neo4j:
    image: neo4j:5.12-community
    container_name: sovrn-neo4j
    restart: unless-stopped
    ports:
      - "127.0.0.1:7474:7474" # HTTP
      - "127.0.0.1:7687:7687" # Bolt
    environment:
      - NEO4J_AUTH=neo4j/${NEO4J_PASSWORD:?set in docker/.env}
      - NEO4J_PLUGINS=["apoc"]
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs

  karakeep-db:
    image: postgres:16-alpine
    container_name: karakeep-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: karakeep
      POSTGRES_USER: karakeep
      POSTGRES_PASSWORD: ${KARAKEEP_DB_PASSWORD:?set in docker/.env}
    volumes:
      - karakeep-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U karakeep"]
      interval: 5s
      timeout: 5s
      retries: 5

  karakeep:
    image: ghcr.io/karakeep-app/karakeep:0.32.0
    container_name: karakeep
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8080"
    environment:
      - DATABASE_URL=postgresql://karakeep:${KARAKEEP_DB_PASSWORD:?set in docker/.env}@karakeep-db:5432/karakeep
      - NEXTAUTH_SECRET=${KARAKEEP_NEXTAUTH_SECRET:?set in docker/.env}
      - NEXTAUTH_URL=http://localhost:8081
      - AUTH_SECRET=${KARAKEEP_NEXTAUTH_SECRET:?set in docker/.env}
      - OLLAMA_HOST=http://host.docker.internal:4000
      - DISABLE_WORKERS=true # ПРИНУДИТЕЛЬНО отключаем воркеры на первый запуск для миграции
    depends_on:
      karakeep-db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # --- Web Intake: ArchiveBox ---
  archivebox:
    image: archivebox/archivebox:0.9.35rc24 # upstream ships rc tags only; pinned > :latest
    container_name: archivebox
    restart: unless-stopped
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - archivebox-data:/data
    environment:
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - MEDIA_MAX_SIZE=750m

  # --- Workflow: n8n ---
  n8n:
    image: n8nio/n8n:2.26.3 # local DB was empty on pin date — fresh init, no 1.x migration risk
    container_name: n8n
    restart: unless-stopped
    ports:
      - "127.0.0.1:5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - NODE_ENV=production
      - WEBHOOK_URL=http://localhost:5678/
      - GENERIC_TIMEZONE=UTC
      - NODES_EXCLUDE=[]
      - N8N_BLOCK_NODES=[]
      - N8N_ENFORCE_SETTINGS_FILE_PERMISSIONS=false
    volumes:
      - ../../../../database.sqlite:/home/node/.n8n/database.sqlite
      - ../../../../Atlas:/home/node/Atlas
      - n8n_data:/home/node/.n8n_unused

volumes:
  langfuse-db-data:
  karakeep-db-data:
  archivebox-data:
  n8n_data:
  neo4j-data:
  neo4j-logs:
