<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" viewBox="0 0 800 450" style="background: #0b0f19; font-family: 'JetBrains Mono', Consolas, monospace;">
  <defs>
    <pattern id="grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 0 20" fill="none" stroke="#111827" stroke-width="0.8"/>
    </pattern>
    <marker id="arrow-cyan" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#22d3ee" />
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#34d399" />
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#a78bfa" />
    </marker>
    <marker id="arrow-amber" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fbbf24" />
    </marker>
    <marker id="arrow-rose" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#fb7185" />
    </marker>
    <marker id="arrow-slate" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b" />
    </marker>
  </defs>
  
  <!-- Grid Background -->
  <rect width="100%" height="100%" fill="url(#grid)" />
  
  <!-- Title -->
  <text x="30" y="35" fill="#f8fafc" font-size="14" font-weight="bold" letter-spacing="1">NAUTILUS CONCEPT FLOWCHART</text>
  <text x="30" y="55" fill="#64748b" font-size="10">Local-First Sovereign Architecture</text>
  
  <!-- Coder Node -->
  <rect x="520" y="25" width="220" height="40" rx="8" fill="#1e293b" fill-opacity="0.4" stroke="#94a3b8" stroke-width="1.5" />
  <text x="630" y="49" fill="#f8fafc" font-size="11" font-weight="bold" text-anchor="middle">SOLO VIBE CODER</text>
  
  <!-- Subgraph 1: Sovereign Workspace -->
  <rect x="30" y="90" width="360" height="330" rx="12" fill="none" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="4,4" />
  <text x="45" y="112" fill="#64748b" font-size="9" font-weight="bold" letter-spacing="0.5">SOVEREIGN LOCAL WORKSPACE (OFFLINE-FIRST)</text>
  
  <!-- Workspace Inside Nodes -->
  <!-- Pilot Node -->
  <rect x="50" y="130" width="320" height="60" rx="8" fill="#083344" fill-opacity="0.3" stroke="#22d3ee" stroke-width="1.5" />
  <text x="210" y="158" fill="#22d3ee" font-size="12" font-weight="bold" text-anchor="middle">PILOT LAYER</text>
  <text x="210" y="174" fill="#94a3b8" font-size="9" text-anchor="middle">Hermes Agent &amp; Specialist Skills</text>
  
  <!-- Compass Node -->
  <rect x="50" y="225" width="320" height="60" rx="8" fill="#064e3b" fill-opacity="0.3" stroke="#34d399" stroke-width="1.5" />
  <text x="210" y="253" fill="#34d399" font-size="12" font-weight="bold" text-anchor="middle">COMPASS LAYER</text>
  <text x="210" y="269" fill="#94a3b8" font-size="9" text-anchor="middle">ENERV Faceted Metadata Indexer</text>
  
  <!-- Brain Node -->
  <rect x="50" y="320" width="320" height="60" rx="8" fill="#4c1d95" fill-opacity="0.3" stroke="#a78bfa" stroke-width="1.5" />
  <text x="210" y="348" fill="#a78bfa" font-size="12" font-weight="bold" text-anchor="middle">BRAIN LAYER</text>
  <text x="210" y="364" fill="#94a3b8" font-size="9" text-anchor="middle">Knowledge Graph &amp; GraphRAG</text>
  
  <!-- Subgraph 2: Storage -->
  <rect x="420" y="90" width="350" height="330" rx="12" fill="none" stroke="#1e293b" stroke-width="1.5" stroke-dasharray="4,4" />
  <text x="435" y="112" fill="#64748b" font-size="9" font-weight="bold" letter-spacing="0.5">SOVEREIGN MEMORY &amp; STORAGE</text>
  
  <!-- Storage Inside Nodes -->
  <!-- Fast Path Node -->
  <rect x="440" y="130" width="310" height="80" rx="8" fill="#78250f" fill-opacity="0.2" stroke="#fbbf24" stroke-width="1.5" />
  <text x="595" y="162" fill="#fbbf24" font-size="12" font-weight="bold" text-anchor="middle">FAST PATH</text>
  <text x="595" y="180" fill="#f8fafc" font-size="10" text-anchor="middle">Obsidian ACE Markdown Vault</text>
  <text x="595" y="194" fill="#64748b" font-size="8" text-anchor="middle">Flat files &amp; direct text journaling</text>
  
  <!-- Slow Path Node -->
  <rect x="440" y="295" width="310" height="80" rx="8" fill="#881337" fill-opacity="0.2" stroke="#fb7185" stroke-width="1.5" />
  <text x="595" y="327" fill="#fb7185" font-size="12" font-weight="bold" text-anchor="middle">SLOW PATH</text>
  <text x="595" y="345" fill="#f8fafc" font-size="10" text-anchor="middle">FalkorDB / Neo4j Graph DB</text>
  <text x="595" y="359" fill="#64748b" font-size="8" text-anchor="middle">Multi-dimensional semantic links</text>
  
  <!-- CONNECTIONS & PATHS -->
  <!-- Coder <--> Pilot -->
  <path d="M 520 45 H 210 V 130" fill="none" stroke="#22d3ee" stroke-width="1.5" stroke-dasharray="2,2" marker-start="url(#arrow-cyan)" marker-end="url(#arrow-cyan)" />
  <text x="360" y="40" fill="#22d3ee" font-size="8" text-anchor="middle">IDE / NATURAL INTERFACE</text>
  
  <!-- Pilot <--> Compass -->
  <path d="M 120 190 V 225" fill="none" stroke="#34d399" stroke-width="1.5" marker-start="url(#arrow-green)" marker-end="url(#arrow-green)" />
  <text x="85" y="212" fill="#34d399" font-size="8">SCHEMA</text>
  
  <!-- Pilot <--> Brain -->
  <path d="M 300 190 V 320" fill="none" stroke="#a78bfa" stroke-width="1.5" marker-start="url(#arrow-purple)" marker-end="url(#arrow-purple)" />
  <text x="305" y="212" fill="#a78bfa" font-size="8">SEMANTIC</text>
  
  <!-- Compass <--> Fast Path -->
  <path d="M 370 255 H 410 V 170 H 440" fill="none" stroke="#fbbf24" stroke-width="1.5" marker-start="url(#arrow-green)" marker-end="url(#arrow-amber)" />
  <text x="405" y="248" fill="#fbbf24" font-size="8" text-anchor="middle">AUDIT</text>
  
  <!-- Brain <--> Slow Path -->
  <path d="M 370 350 H 440" fill="none" stroke="#fb7185" stroke-width="1.5" marker-start="url(#arrow-purple)" marker-end="url(#arrow-rose)" />
  <text x="405" y="342" fill="#fb7185" font-size="8" text-anchor="middle">VECTOR</text>
  
  <!-- Fast Path --> Slow Path -->
  <path d="M 595 210 V 295" fill="none" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow-slate)" />
  <rect x="520" y="235" width="150" height="20" rx="4" fill="#0f172a" stroke="#1e293b" />
  <text x="595" y="248" fill="#64748b" font-size="8" font-weight="bold" text-anchor="middle">DAILY FACT CONSOLIDATION</text>
  
</svg>
