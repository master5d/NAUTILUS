<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project Nexus - Premium Visualization</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cytoscape/3.26.0/cytoscape.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;500;700&display=swap');

        body {
            margin: 0;
            padding: 0;
            background-color: #0b1e14; /* Deep Charcoal Base */
            background-image: 
                radial-gradient(circle at 50% 50%, #161b22 0%, #0b0e14 100%);
            color: #e6edf3;
            font-family: 'JetBrains Mono', monospace;
            overflow: hidden;
        }

        #cy {
            width: 100vw;
            height: 100vh;
            display: block;
        }

        #header {
            position: absolute;
            top: 30px;
            left: 30px;
            z-index: 10;
            pointer-events: none;
        }

        h1 { 
            margin: 0; 
            font-weight: 700; 
            letter-spacing: 4px; 
            color: #00f2ff; /* Neon Cyan */
            text-shadow: 0 0 15px rgba(0, 242, 255, 0.6);
            font-size: 28px;
        }

        .subtitle {
            color: #8b949e;
            font-size: 12px;
            letter-spacing: 2px;
            margin-top: 5px;
            text-transform: uppercase;
        }

        .legend {
            position: absolute;
            bottom: 30px;
            left: 30px;
            background: rgba(11, 14, 20, 0.9);
            padding: 20px;
            border-radius: 4px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .legend-title {
            font-size: 10px;
            color: #6e7681;
            margin-bottom: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            font-weight: 700;
        }

        .legend-item { 
            display: flex; 
            align-items: center; 
            margin: 8px 0; 
            font-size: 13px;
            color: #d0d7de;
        }

        .legend-color { 
            width: 12px; 
            height: 12px; 
            margin-right: 12px; 
            border-radius: 2px;
            box-shadow: 0 0 8px currentColor;
        }
    </style>
</head>
<body>
    <div id="header">
        <h1>PROJECT NEXUS</h1>
        <div class="subtitle">System Architecture & Multi-Agent Network</div>
    </div>

    <div id="cy"></div>

    <div class="legend">
        <div class="legend-title">System Classifications</div>
        <div class="legend-item"><div class="legend-color" style="background: #00f2ff; color: rgba(0, 242, 255, 0.5);"></div> BRAIN / CORE</div>
        <div class="legend-item"><div class="legend-color" style="background: #ffb700; color: rgba(255, 183, 0, 0.5);"></div> FUEL / KNOWLEDGE</div>
        <div class="legend-item"><div class="legend-color" style="background: #00ff88; color: rgba(0, 255, 136, 0.5);"></div> REVENUE / AGENCY</div>
        <div class="legend-item"><div class="legend-color" style="background: #ff4d4d; color: rgba(255, 77, 77, 0.5);"></div> HEALTH / BIO</div>
        <div class="legend-item"><div class="legend-color" style="background: #bc85ff; color: rgba(188, 133, 255, 0.5);"></div> LAB / APPS</div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function(){
            var cy = cytoscape({
                container: document.getElementById('cy'),
                elements: [
                    // BRAIN/CORE
                    { data: { id: 'agentic_ai', label: 'AGENTIC CORE', category: 'core' } },

                    // FUEL/KNOWLEDGE
                    { data: { id: 'evernote', label: 'Evernote', category: 'fuel' } },
                    { data: { id: 'lifebook', label: 'LifeBook', category: 'fuel' } },
                    { data: { id: 'telegram_obsidian', label: 'Obsidian', category: 'fuel' } },
                    { data: { id: 'facet_system', label: 'Facets', category: 'fuel' } },
                    
                    // REVENUE/AGENCY
                    { data: { id: 'synergify', label: 'Synergify', category: 'revenue' } },
                    { data: { id: 'agentic_council', label: 'Council', category: 'revenue' } },
                    { data: { id: 'growththerapy', label: 'GrowTherapy', category: 'revenue' } },

                    // HEALTH/BIO
                    { data: { id: 'liver_flush', label: 'Liver Flush', category: 'health' } },
                    { data: { id: 'yoga', label: 'Tantra Yoga', category: 'health' } },
                    { data: { id: 'bodynamic', label: 'Bodynamic', category: 'health' } },
                    { data: { id: 'neurodivert', label: 'Neurodivert', category: 'health' } },

                    // LAB/APPS
                    { data: { id: 'cclab03', label: 'CCLab03', category: 'lab' } },
                    { data: { id: 'agent_sdk', label: 'Agent SDK', category: 'lab' } },
                    { data: { id: 'whisperdesk', label: 'WhisperDesk', category: 'lab' } },
                    { data: { id: 'chatexport', label: 'ChatExport', category: 'lab' } },
                    { data: { id: 'arena', label: 'Agents Arena', category: 'lab' } },

                    // Connections
                    { data: { source: 'evernote', target: 'agentic_ai' } },
                    { data: { source: 'lifebook', target: 'agentic_ai' } },
                    { data: { source: 'telegram_obsidian', target: 'agentic_ai' } },
                    { data: { source: 'agentic_ai', target: 'agentic_council' } },
                    { data: { source: 'agentic_ai', target: 'synergify' } },
                    { data: { source: 'agentic_ai', target: 'cclab03' } },
                    { data: { source: 'agentic_ai', target: 'agent_sdk' } },
                    { data: { source: 'agent_sdk', target: 'whisperdesk' } },
                    { data: { source: 'yoga', target: 'lifebook' } },
                    { data: { source: 'liver_flush', target: 'lifebook' } }
                ],
                style: [
                    {
                        selector: 'node',
                        style: {
                            'label': 'data(label)',
                            'font-family': 'JetBrains Mono',
                            'font-size': '15px',
                            'font-weight': '500',
                            'color': '#ffffff',
                            'text-valign': 'bottom',
                            'text-margin-y': '12px',
                            'background-color': '#2d333b',
                            'width': '50px',
                            'height': '50px',
                            'text-outline-width': 2,
                            'text-outline-color': '#0b0e14',
                            'overlay-padding': '6px',
                            'z-index': 10
                        }
                    },
                    {
                        selector: 'node[category="core"]',
                        style: {
                            'width': '100px',
                            'height': '100px',
                            'background-color': '#00f2ff',
                            'text-outline-color': '#00f2ff',
                            'color': '#0b0e14',
                            'text-valign': 'center',
                            'text-margin-y': 0,
                            'font-weight': '700',
                            'font-size': '16px',
                            'shadow-blur': 25,
                            'shadow-color': '#00f2ff',
                            'shadow-opacity': 0.8
                        }
                    },
                    {
                        selector: 'node[category="fuel"]',
                        style: {
                            'background-color': '#ffb700',
                            'shadow-blur': 15,
                            'shadow-color': '#ffb700',
                            'shadow-opacity': 0.4
                        }
                    },
                    {
                        selector: 'node[category="revenue"]',
                        style: {
                            'background-color': '#00ff88',
                            'shadow-blur': 15,
                            'shadow-color': '#00ff88',
                            'shadow-opacity': 0.4
                        }
                    },
                    {
                        selector: 'node[category="health"]',
                        style: {
                            'background-color': '#ff4d4d',
                            'shadow-blur': 15,
                            'shadow-color': '#ff4d4d',
                            'shadow-opacity': 0.4
                        }
                    },
                    {
                        selector: 'node[category="lab"]',
                        style: {
                            'background-color': '#bc85ff',
                            'shadow-blur': 15,
                            'shadow-color': '#bc85ff',
                            'shadow-opacity': 0.4
                        }
                    },
                    {
                        selector: 'edge',
                        style: {
                            'width': 3,
                            'line-color': 'rgba(255, 255, 255, 0.1)',
                            'curve-style': 'bezier',
                            'target-arrow-shape': 'triangle',
                            'target-arrow-color': 'rgba(255, 255, 255, 0.1)',
                            'arrow-scale': 1.5
                        }
                    }
                ],
                layout: {
                    name: 'cose',
                    padding: 100,
                    nodeOverlap: 10,
                    idealEdgeLength: 150,
                    edgeElasticity: 100,
                    nestingFactor: 5,
                    gravity: 80,
                    numIter: 1000,
                    initialTemp: 200,
                    coolingFactor: 0.95,
                    minTemp: 1.0
                }
            });
        });
    </script>
</body>
</html>
