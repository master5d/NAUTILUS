# litellm-config.yaml
# Agentic AI v3.3 — Rotating cloud pool + local fallback
# IMPORTANT: Pin LiteLLM version, never use main-latest
# Install: pip install "litellm[proxy]==1.57.4" "langfuse>=2.6.0,<3"
# NOTE: langfuse 4.x breaks litellm 1.57.4 (removed version module) — keep langfuse pinned to 2.x
# Run:     litellm --config litellm-config.yaml --port 4000
#
# API keys: set as environment variables, never hardcode
#   $env:CEREBRAS_API_KEY = "..."
#   $env:GROQ_API_KEY = "..."
#   $env:NIM_API_KEY = "..."
#   $env:OPENROUTER_API_KEY = "..."
#   $env:GEMINI_API_KEY = "..."

model_list:
  # --- Cloud rotating pool (all free tiers, OpenAI-compatible) ---
  - model_name: fast-pool
    litellm_params:
      model: cerebras/qwen-3-235b-a22b-instruct-2507
      api_key: os.environ/CEREBRAS_API_KEY
      rpm: 30
      # Qwen3-235B on Cerebras wafer chip: ~1000 TPS, free tier 1M tok/day

  - model_name: fast-pool
    litellm_params:
      model: groq/llama-3.3-70b-versatile
      api_key: os.environ/GROQ_API_KEY
      rpm: 30
      # Free tier: 30 RPM, 12K TPM, 100K TPD, 1K RPD (verified 2026-06-10, см. quotas.json)

  - model_name: fast-pool
    litellm_params:
      model: groq/meta-llama/llama-4-scout-17b-16e-instruct
      api_key: os.environ/GROQ_API_KEY
      rpm: 30
      # Llama 4 Scout: 10M context, free tier

  - model_name: fast-pool
    litellm_params:
      # Register as openai/... namespace to avoid mis-classification (issue #24366)
      model: openai/meta/llama-3.3-70b-instruct
      api_base: https://integrate.api.nvidia.com/v1
      api_key: os.environ/NIM_API_KEY
      rpm: 40
      # Free tier: 40 RPM/model (verified 2026-06-10), no daily cap; credits-based signup pool

  - model_name: fast-pool
    litellm_params:
      model: openrouter/meta-llama/llama-3.3-70b-instruct:free
      api_key: os.environ/OPENROUTER_API_KEY
      rpm: 20
      # $10 deposit for 1K RPD across 29 free models

  # --- Hermes primary brain (Gemini 3 Flash via Google AI Studio free tier) ---
  # model_name matches OpenRouter catalog ID so Hermes catalog validation passes
  - model_name: google/gemini-3-flash-preview
    litellm_params:
      model: gemini/gemini-3-flash-preview
      api_key: os.environ/GEMINI_API_KEY
      rpm: 15
      # Routes to Google AI Studio: free tier 15 RPM, 1500 RPD, 1M context

  # --- Local power tier (Surface 30B, on-demand) ---
  # no-floor variant (Garage): the M4 gateway runs NO local model. Surface's
  # llama-server (Qwen3-Coder-30B-A3B) is an OPTIONAL power tier, present only
  # when the laptop is up. Set api_base to the Surface LAN IP and uncomment to
  # add it to the chain as tolerated-down. Until then the gateway is cloud-only.
  # - model_name: power-local
  #   litellm_params:
  #     model: openai/qwen3-coder
  #     api_base: http://<surface-lan-ip>:8080/v1
  #     api_key: dummy

  # --- HF Serverless Inference (DISABLED 2026-06-13) ---
  # Removed from active config: HF_TOKEN is unset (on the rotation list) and
  # LiteLLM 1.57.4 crashes at startup creating the OpenAI client with an empty
  # key (does NOT self-skip). Re-add these two blocks once HF_TOKEN is set:
  #   - model_name: hf-llama-70b → openai/meta-llama/Llama-3.3-70B-Instruct
  #   - model_name: hf-qwen-72b  → openai/Qwen/Qwen2.5-72B-Instruct
  #   api_base: https://router.huggingface.co/v1 · api_key: os.environ/HF_TOKEN

  # --- Reasoning models (on-demand, not in rotation) ---
  - model_name: reasoning
    litellm_params:
      model: groq/qwen/qwen3-32b
      api_key: os.environ/GROQ_API_KEY
      # Qwen3-32B: hybrid thinking mode, replaces decommissioned deepseek-r1

litellm_settings:
  # CRITICAL: explicit fallbacks array (issue #26015)
  # no-floor (Garage): chains end at cloud, NOT a local server (M4 runs no model).
  # NB: hf-* tiers need HF_TOKEN (currently unset) — they self-skip if absent.
  fallbacks:
    - {"google/gemini-3-flash-preview": ["fast-pool"]}
    - {"fast-pool": ["google/gemini-3-flash-preview"]}
    - {"reasoning": ["fast-pool"]}
  default_fallbacks: ["fast-pool"]
  context_window_fallbacks:
    - {"fast-pool": ["google/gemini-3-flash-preview"]}
  request_timeout: 60
  num_retries: 2
  drop_params: true  # drop unsupported params per provider silently
  success_callback: ["langfuse"]
  failure_callback: ["langfuse"]
  # SOVERN Labwatch: sovereign usage tracking → labwatch/usage.db (SQLite, local-only)
  # usage_logger.py lives next to this config; dashboard reads the DB on :4002
  callbacks: usage_logger.usage_tracker

router_settings:
  routing_strategy: simple-shuffle
  cooldown_time: 60
  allowed_fails: 1
  retry_policy:
    RateLimitErrorRetries: 2
    TimeoutErrorRetries: 2
    InternalServerErrorRetries: 3
  allowed_fails_policy:
    RateLimitErrorAllowedFails: 2

environment_variables:
  LANGFUSE_PUBLIC_KEY: os.environ/LANGFUSE_PUBLIC_KEY
  LANGFUSE_SECRET_KEY: os.environ/LANGFUSE_SECRET_KEY
  LANGFUSE_HOST: "http://localhost:3002"  # compose maps 3002→3000 (3000 занят LangGraph)
